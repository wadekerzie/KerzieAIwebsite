<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1080" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050404"/>
      <stop offset="1" stop-color="#0B0707"/>
    </linearGradient>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(310 160) rotate(20) scale(520 360)">
      <stop stop-color="#FF2A2A" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FF2A2A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 170) rotate(-10) scale(560 380)">
      <stop stop-color="#F3E7CF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#F3E7CF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(760 520) rotate(-12) scale(620 420)">
      <stop stop-color="#FF2A2A" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FF2A2A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="320" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3E7CF"/>
      <stop offset="0.55" stop-color="#FF2A2A"/>
      <stop offset="1" stop-color="#F3E7CF" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <rect width="1200" height="630" fill="url(#g3)"/>

  <!-- Subtle “network” -->
  <g opacity="0.22" stroke="white">
    <path d="M90 120H1110" stroke-opacity="0.06"/>
    <path d="M90 200H1110" stroke-opacity="0.05"/>
    <path d="M90 280H1110" stroke-opacity="0.05"/>
    <path d="M90 360H1110" stroke-opacity="0.05"/>
    <path d="M90 440H1110" stroke-opacity="0.05"/>
    <path d="M90 520H1110" stroke-opacity="0.05"/>
    <path d="M140 90V570" stroke-opacity="0.05"/>
    <path d="M260 90V570" stroke-opacity="0.05"/>
    <path d="M380 90V570" stroke-opacity="0.05"/>
    <path d="M500 90V570" stroke-opacity="0.05"/>
    <path d="M620 90V570" stroke-opacity="0.05"/>
    <path d="M740 90V570" stroke-opacity="0.05"/>
    <path d="M860 90V570" stroke-opacity="0.05"/>
    <path d="M980 90V570" stroke-opacity="0.05"/>
    <path d="M1100 90V570" stroke-opacity="0.05"/>
  </g>

  <!-- Mark -->
  <g transform="translate(90 92)">
    <rect x="0" y="0" width="72" height="72" rx="22" fill="rgba(243,231,207,0.05)" stroke="rgba(243,231,207,0.22)"/>
    <circle cx="36" cy="36" r="24.5" stroke="url(#accent)" stroke-width="4.2" opacity="0.96"/>

    <!-- K monogram -->
    <path d="M26 22V50" stroke="url(#accent)" stroke-width="4.8" stroke-linecap="round"/>
    <path d="M29 36L50 22" stroke="url(#accent)" stroke-width="4.8" stroke-linecap="round"/>
    <path d="M29 36L52 50" stroke="url(#accent)" stroke-width="4.8" stroke-linecap="round"/>

    <!-- nodes -->
    <circle cx="52" cy="22" r="3.1" fill="#F3E7CF" opacity="0.95"/>
    <circle cx="50" cy="36" r="3.1" fill="#FF2A2A" opacity="0.95"/>
    <circle cx="52" cy="50" r="3.1" fill="#F3E7CF" opacity="0.92"/>
  </g>

  <!-- Text -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#F3E7CF">
    <text x="180" y="140" font-size="34" font-weight="700" opacity="0.9">Kerzie AI</text>
    <text x="180" y="185" font-size="54" font-weight="800" letter-spacing="-0.8">
      Intelligent automation for the
    </text>
    <text x="180" y="242" font-size="54" font-weight="800" letter-spacing="-0.8" fill="url(#accent)">
      age of intelligence.
    </text>
    <text x="180" y="305" font-size="24" font-weight="500" opacity="0.78">
      We help small businesses stay competitive with applied AI + automation.
    </text>
    <text x="180" y="342" font-size="24" font-weight="500" opacity="0.78">
      Deployed through an army of AI scouts: discover → design → deploy → scale.
    </text>
  </g>

  <!-- Bottom glow -->
  <g opacity="0.45" filter="url(#soft)">
    <ellipse cx="820" cy="560" rx="340" ry="120" fill="#FF2A2A" fill-opacity="0.10"/>
    <ellipse cx="930" cy="560" rx="300" ry="110" fill="#F3E7CF" fill-opacity="0.06"/>
  </g>
</svg>


