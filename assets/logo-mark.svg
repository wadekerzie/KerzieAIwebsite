<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kerzie AI">
  <defs>
    <linearGradient id="g" x1="18" y1="18" x2="110" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.52" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="g2" x1="28" y1="34" x2="102" y2="94" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#3B82F6" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F8FAFC" stop-opacity="0.88"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(42 34) rotate(45) scale(110)">
      <stop stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Base tile -->
  <rect x="10" y="10" width="108" height="108" rx="34" fill="#070606"/>
  <rect x="10.5" y="10.5" width="107" height="107" rx="33.5" stroke="url(#g)" stroke-opacity="0.55"/>
  <rect x="10" y="10" width="108" height="108" rx="34" fill="url(#glow)"/>

  <!-- Neural ring -->
  <path
    d="M64 28C44.118 28 28 44.118 28 64C28 83.882 44.118 100 64 100C83.882 100 100 83.882 100 64C100 44.118 83.882 28 64 28Z"
    stroke="url(#g2)"
    stroke-width="4.5"
    stroke-opacity="0.95"
  />

  <!-- Monogram K (precise + angular) -->
  <path
    d="M48 44V84"
    stroke="url(#g2)"
    stroke-width="5.2"
    stroke-linecap="round"
  />
  <path
    d="M52 64L82 44"
    stroke="url(#g2)"
    stroke-width="5.2"
    stroke-linecap="round"
  />
  <path
    d="M52 64L84 84"
    stroke="url(#g2)"
    stroke-width="5.2"
    stroke-linecap="round"
  />

  <!-- Circuit nodes -->
  <g opacity="0.95">
    <circle cx="84" cy="44" r="3.6" fill="#F8FAFC"/>
    <circle cx="82" cy="64" r="3.6" fill="#3B82F6"/>
    <circle cx="84" cy="84" r="3.6" fill="#F8FAFC"/>
  </g>

  <!-- Subtle scan highlight -->
  <g filter="url(#soft)" opacity="0.30">
    <path d="M26 58C44 48 74 46 102 54" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>


